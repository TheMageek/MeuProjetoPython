<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "InvestEdu — Análise de Ações" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  <style>
    svg.icon{display:inline-block;vertical-align:middle;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  </style>
</head>
<body>

<!-- ===== TOPBAR ===== -->
<div class="topbar">
  <div class="container">
    <div class="nav">
      <!-- Logo -->
      <a class="brand" href="{{ url_for('index') }}">
        <div class="brand-icon">📈</div>
        Invest<span class="brand-edu">Edu</span>
      </a>

      <!-- Desktop nav tabs -->
      <nav class="nav-tabs">
        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
          <svg class="icon" width="15" height="15" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Início
        </a>
        <a class="nav-link {% if request.endpoint == 'analyze' %}active{% endif %}" href="{{ url_for('index') }}#analisar">
          <svg class="icon" width="15" height="15" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Analisar
        </a>
        <a class="nav-link {% if request.endpoint == 'historico' %}active{% endif %}" href="{{ url_for('historico') }}">
          <svg class="icon" width="15" height="15" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Histórico
        </a>
        <a class="nav-link {% if request.endpoint == 'tutorial' %}active{% endif %}" href="{{ url_for('tutorial') }}">
          <svg class="icon" width="15" height="15" viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
          Tutorial
        </a>
        <a class="nav-link {% if request.endpoint == 'faq' %}active{% endif %}" href="{{ url_for('faq') }}">
          <svg class="icon" width="15" height="15" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          FAQ
        </a>
      </nav>

      <!-- Mobile hamburger -->
      <button class="hamburger" onclick="toggleMobileNav()" aria-label="Menu">
        <svg id="ham-open" class="icon" width="20" height="20" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg id="ham-close" class="icon" width="20" height="20" viewBox="0 0 24 24" style="display:none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Mobile nav drawer -->
    <div class="mobile-nav" id="mobileNav">
      <a class="mobile-nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}" onclick="closeMobileNav()">🏠 Início</a>
      <a class="mobile-nav-link {% if request.endpoint == 'analyze' %}active{% endif %}" href="{{ url_for('index') }}#analisar" onclick="closeMobileNav()">🔍 Analisar</a>
      <a class="mobile-nav-link {% if request.endpoint == 'historico' %}active{% endif %}" href="{{ url_for('historico') }}" onclick="closeMobileNav()">⏱ Histórico</a>
      <a class="mobile-nav-link {% if request.endpoint == 'tutorial' %}active{% endif %}" href="{{ url_for('tutorial') }}" onclick="closeMobileNav()">📚 Tutorial</a>
      <a class="mobile-nav-link {% if request.endpoint == 'faq' %}active{% endif %}" href="{{ url_for('faq') }}" onclick="closeMobileNav()">❓ FAQ</a>
    </div>
  </div>
</div>

<!-- ===== PAGE CONTENT ===== -->
<div class="page-content">
  {% block content %}{% endblock %}
</div>

<!-- ===== FOOTER ===== -->
<div class="container">
  <div class="footer">
    <div>⚡ InvestEdu — Plataforma educacional (protótipo). Dados e resultados são meramente informativos, não constituem recomendação de investimento.</div>
  </div>
</div>

<script>
  function toggleMobileNav() {
    const nav = document.getElementById('mobileNav');
    const open = document.getElementById('ham-open');
    const close = document.getElementById('ham-close');
    nav.classList.toggle('open');
    if (nav.classList.contains('open')) {
      open.style.display = 'none'; close.style.display = '';
    } else {
      open.style.display = ''; close.style.display = 'none';
    }
  }
  function closeMobileNav() {
    document.getElementById('mobileNav').classList.remove('open');
    document.getElementById('ham-open').style.display = '';
    document.getElementById('ham-close').style.display = 'none';
  }
</script>

</body>
</html>
