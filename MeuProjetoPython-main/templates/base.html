<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title or "Invest Assistant" }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <div class="topbar">
    <div class="container">
      <div class="nav">
        <a class="brand" href="{{ url_for('index') }}">
          <span style="width:12px;height:12px;border-radius:6px;background:var(--gradient-hero);display:inline-block;"></span>
          Invest Assistant
        </a>

        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
          <a class="btn btn-outline" href="{{ url_for('index') }}">Início</a>
          <a class="btn btn-outline" href="{{ url_for('index') }}#analisar">Analisar</a>
        </div>
      </div>
    </div>
  </div>

  {% block content %}{% endblock %}

  <div class="container">
    <div class="footer">
      <div>Plataforma educacional (protótipo). Dados e resultados são informativos.</div>
    </div>
  </div>
</body>
</html>
